<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karaoke Stage | Swipe Songs · Smooth Slide Lyrics · Jazz Club Lights</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="floating-bg" id="floatingBg"></div>

<!-- JAZZ CLUB LIGHTS -->
<div class="jazz-lights">
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="moving-spot"></div>
    <div class="moving-spot"></div>
</div>

<div class="picker-stage" id="pickerStage">
    <div class="carousel-container" id="carouselContainer"></div>
    <div class="swipe-hint">
        <span>⬅️ SWIPE / DRAG LEFT / RIGHT ➡️</span>
        <span>✨ TAP CENTER CARD TO PLAY ✨</span>
    </div>
    <div class="instruction">🎶 choose a song, tap to unleash karaoke magic 🎶</div>
    <div class="scroll-spacer"></div>
</div>

<div class="screen-transition" id="transitionOverlay"></div>

<!-- KARAOKE SCREEN with SMOOTH SLIDE LYRICS -->
<div id="karaokeScreen" class="karaoke-screen">
    <video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
        <source src="assets/themes/theme1.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="song-title-header" id="karaokeSongTitle">Little Things - Manana</div>
    <div class="lyrics-stage">
        <div class="lyrics-slide-container" id="lyricsSlideContainer">
            <div class="lyric-slide-item next-3" id="lyric3Slide">✨ enjoy the show ✨</div>
            <div class="lyric-slide-item next-2" id="lyric2Slide">🎤 to sing along</div>
            <div class="lyric-slide-item next-1" id="lyric1Slide">🎶 get ready</div>
            <div class="lyric-slide-item current" id="currentLyricSlide">✨ tap play ✨</div>
        </div>
    </div>
    <div class="karaoke-controls">

        <div class="player-controls">
            <div class="progress-area">
                <span id="currentTimeDisplay" class="time-display">0:00</span>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span id="durationDisplay" class="time-display">0:00</span>
            </div>
            <div class="action-buttons">
                        <select id="videoThemeSelect" class="theme-select">
            <option value="assets/themes/theme1.mp4" selected>🎬 Theme 1</option>
            <option value="assets/themes/theme2.mp4">🎬 Theme 2</option>
            <option value="assets/themes/theme3.mp4">🎬 Theme 3</option>
            <option value="assets/themes/theme4.mp4">🎬 Theme 4</option>
            <option value="assets/themes/theme5.mp4">🎬 Theme 5</option>
            <option value="assets/themes/theme6.mp4">🎬 Theme 6</option>
        </select>
                <button id="playPauseBtn" class="control-btn play-btn">▶</button>
                <button id="exitKaraokeBtn" class="control-btn exit-btn">🏠 EXIT</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
